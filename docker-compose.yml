version: '2.4'

services:
  doiscode-cms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doiscode-cms
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Set your production environment variables here or via a .env file on the server
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://doiscode.com
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - doiscode_uploads:/app/public/uploads

volumes:
  doiscode_uploads:
