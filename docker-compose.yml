version: '3.8'

services:
  doiscode-cms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doiscode-cms
    restart: unless-stopped
    ports:
      # Exposes container port 3000 to host port 3000
      # Your Apache reverse proxy will forward traffic to localhost:3000
      - "3000:3000"
    environment:
      # Set your production environment variables here or via a .env file on the server
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://temp.doiscode.com
      # Postgres connection string (since it's on the exact same VPS and accessible via its public IP)
      - DATABASE_URL=postgresql://postgres:wiHifod6969%3F@31.97.107.242:5432/doiscode_website
      - JWT_SECRET="doiscode-cms-super-secret-jwt-key-change-in-production"
      
    # If using local network, attach it properly. 
    # Since Postgres is external, standard bridge is fine.
