version: '2.4'

services:
  doiscode-cms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doiscode-cms
    restart: unless-stopped
    network_mode: "host"
    environment:
      # Set your production environment variables here or via a .env file on the server
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=https://temp.doiscode.com
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      
    # If using local network, attach it properly. 
    # Since Postgres is external, standard bridge is fine.
